<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMPOSTOR</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d14;--ink2:#1a1a28;--ink3:#252538;
  --line:#2e2e48;--line2:#3d3d5c;
  --fog:#8888aa;--dust:#b0b0cc;--snow:#e8e8f2;
  --gold:#c9a84c;--gold2:#e8c96d;
  --rose:#e8455a;--rose2:#ff6b80;
  --jade:#2ecf8a;--jade2:#5de9a8;
  --iris:#7b61ff;
  --r:14px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}
html,body{min-height:100%;background:var(--ink);color:var(--snow);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
#app{min-height:100vh;display:flex;align-items:flex-start;justify-content:center}

/* ── SCREEN ─────────────────────────────────── */
.screen{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:36px 20px 80px;gap:18px;position:relative}

/* ── HOME ───────────────────────────────────── */
.home-screen{justify-content:center}
.home-aurora{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.home-aurora::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;top:-200px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(123,97,255,.15) 0%,transparent 70%)}
.home-aurora::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;bottom:-80px;right:-80px;background:radial-gradient(circle,rgba(232,69,90,.10) 0%,transparent 70%)}
.home-inner{position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center;gap:48px}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}

/* ── DETECTIVE ICON (SVG) ────────────────────── */
.detective-icon{
  width:80px;height:80px;
  filter:drop-shadow(0 0 18px rgba(201,168,76,.55));
  animation:breathe 3s ease-in-out infinite;
}
@keyframes breathe{0%,100%{transform:scale(1);filter:drop-shadow(0 0 18px rgba(201,168,76,.55))}50%{transform:scale(1.07);filter:drop-shadow(0 0 30px rgba(201,168,76,.85))}}

.logo-title{font-family:var(--serif);font-size:clamp(52px,14vw,84px);font-weight:700;letter-spacing:.06em;line-height:.9;background:linear-gradient(170deg,var(--snow) 0%,var(--gold2) 45%,var(--rose) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--fog)}
.home-btns{display:flex;flex-direction:column;gap:12px;width:100%}
.home-note{font-size:12px;color:var(--fog);font-family:var(--mono);letter-spacing:.05em;text-align:center}

/* ── BUTTONS ────────────────────────────────── */
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px 24px;border:none;border-radius:var(--r);font-family:var(--sans);font-size:15px;font-weight:600;letter-spacing:.02em;cursor:pointer;transition:all .18s ease;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .18s}
.btn:hover:not(:disabled)::after{background:rgba(255,255,255,.07)}
.btn:active:not(:disabled){transform:scale(.975)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,#b8922a,var(--gold),#d4a840);color:#150f00;font-weight:700;box-shadow:0 4px 20px rgba(201,168,76,.28)}
.btn-ghost{background:transparent;color:var(--snow);border:1px solid var(--line2)}
.btn-ghost:hover:not(:disabled){border-color:var(--dust)}
.btn-iris{background:linear-gradient(135deg,#5c42d4,var(--iris));color:#fff;box-shadow:0 4px 20px rgba(123,97,255,.3)}

/* ── CARD ───────────────────────────────────── */
.card{width:100%;background:var(--ink2);border:1px solid var(--line);border-radius:20px;padding:28px 24px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.card-sm{padding:20px}
.card-title{font-family:var(--serif);font-size:26px;font-weight:700;line-height:1.1;color:var(--snow)}
.card-sub{font-size:13px;color:var(--fog);line-height:1.6;margin-top:4px}
.input-field{width:100%;padding:13px 16px;background:var(--ink3);border:1px solid var(--line2);border-radius:var(--r);color:var(--snow);font-family:var(--sans);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
.input-field:focus{border-color:var(--iris);box-shadow:0 0 0 3px rgba(123,97,255,.15)}
.input-field::placeholder{color:var(--fog)}
.back-btn{background:none;border:none;color:var(--fog);font-family:var(--sans);font-size:14px;cursor:pointer;align-self:flex-start;display:flex;align-items:center;gap:6px;transition:color .15s;padding:0}
.back-btn:hover{color:var(--snow)}
.divider{display:flex;align-items:center;gap:12px;width:100%;color:var(--fog);font-size:11px;font-family:var(--mono);letter-spacing:.1em}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
.code-chip{display:inline-flex;align-items:center;font-family:var(--mono);letter-spacing:.22em;font-size:15px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--gold2);padding:4px 14px;border-radius:8px}

/* ── QR SCANNER (join screen) ───────────────── */
.scanner-shell{width:100%;border-radius:16px;overflow:hidden;border:1px solid var(--line2);background:#000;min-height:60px}
#qr-reader{width:100%!important}
#qr-reader video{border-radius:0!important;width:100%!important;display:block}
#qr-reader img{display:none!important}
#qr-reader__header_message{display:none!important}
#qr-reader__dashboard_section_csr button{background:var(--iris)!important;color:#fff!important;border:none!important;padding:10px 20px!important;border-radius:8px!important;font-family:var(--sans)!important;font-size:14px!important;cursor:pointer!important;margin:8px 0!important}
#qr-reader__status_span{color:var(--fog)!important;font-size:11px!important;font-family:var(--mono)!important}
#qr-reader__dashboard_section_swaplink{color:var(--iris)!important;font-size:12px!important}
#qr-reader__filescan_input{color:var(--snow)!important}
.scan-note{font-size:12px;color:var(--fog);font-family:var(--mono);text-align:center;letter-spacing:.05em;padding:4px 0}
.scan-ok{color:var(--jade)!important}

/* ── LOBBY ──────────────────────────────────── */
.lobby-top{width:100%;background:var(--ink2);border:1px solid var(--line);border-radius:20px;padding:22px 24px;display:flex;flex-direction:column;gap:16px}
.lobby-code-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.lobby-code-label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--fog);margin-bottom:6px}
.lobby-code{font-family:var(--mono);font-size:clamp(32px,10vw,50px);font-weight:500;letter-spacing:.3em;color:var(--gold2);line-height:1}
.lobby-count{font-family:var(--mono);font-size:11px;color:var(--fog);margin-top:8px;letter-spacing:.1em}
.qr-preview{background:#fff;border-radius:10px;padding:6px;flex-shrink:0;cursor:pointer;transition:transform .15s;border:2px solid transparent}
.qr-preview:hover{transform:scale(1.04);border-color:rgba(201,168,76,.4)}

/* Show QR button */
.show-qr-btn{width:100%;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:11px 16px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;font-family:var(--sans);font-size:14px;font-weight:600;color:var(--gold2);transition:all .18s}
.show-qr-btn:hover{background:rgba(201,168,76,.14);border-color:rgba(201,168,76,.45)}

/* Player list — vertical */
.plist-v{width:100%;display:flex;flex-direction:column;gap:8px}
.prow{display:flex;align-items:center;gap:12px;background:var(--ink3);border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:14px;animation:slideIn .22s ease}
@keyframes slideIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.prow.is-host{border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.05)}
.prow.is-me{border-color:rgba(123,97,255,.4);background:rgba(123,97,255,.06)}
.p-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--iris),var(--rose));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.p-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.p-badge{font-size:10px;font-family:var(--mono);letter-spacing:.08em;padding:3px 8px;border-radius:10px;flex-shrink:0}
.badge-host{background:rgba(201,168,76,.15);color:var(--gold2)}
.badge-you{background:rgba(123,97,255,.15);color:#a89aff}

.lobby-footer{width:100%;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.lobby-status{font-size:14px;color:var(--fog)}
.lobby-hint{font-size:12px;color:var(--fog);font-family:var(--mono);line-height:1.8;letter-spacing:.03em}

/* ── QR MODAL ───────────────────────────────── */
.qr-modal-overlay{position:fixed;inset:0;background:rgba(8,8,16,.88);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.qr-modal{background:var(--ink2);border:1px solid var(--line2);border-radius:24px;padding:32px 28px;display:flex;flex-direction:column;align-items:center;gap:20px;max-width:340px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.7);animation:popUp .25s cubic-bezier(.34,1.4,.64,1)}
@keyframes popUp{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.qr-modal-title{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--snow);text-align:center}
.qr-modal-sub{font-family:var(--mono);font-size:11px;letter-spacing:.15em;color:var(--fog);text-align:center}
.qr-big-wrap{background:#fff;border-radius:16px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.qr-modal-code{font-family:var(--mono);font-size:28px;font-weight:500;letter-spacing:.35em;color:var(--gold2);text-align:center}
.qr-modal-close{background:var(--ink3);border:1px solid var(--line2);color:var(--dust);font-family:var(--sans);font-size:14px;font-weight:600;padding:11px 32px;border-radius:12px;cursor:pointer;width:100%;transition:all .15s}
.qr-modal-close:hover{border-color:var(--dust);color:var(--snow)}

/* ── ROLE CARD ──────────────────────────────── */
.role-screen{justify-content:center}
.role-card{width:100%;border-radius:24px;padding:44px 28px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;animation:cardPop .5s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
@keyframes cardPop{from{transform:scale(.84);opacity:0}to{transform:scale(1);opacity:1}}
.rc-crew{background:linear-gradient(160deg,#071a10,#0d2a18);border:1px solid rgba(46,207,138,.25)}
.rc-imp{background:linear-gradient(160deg,#1a0710,#2a0d18);border:1px solid rgba(232,69,90,.25)}
.role-orb{font-size:48px;line-height:1;animation:breathe 2s ease-in-out infinite}
.role-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--fog)}
.role-name{font-family:var(--serif);font-size:clamp(42px,12vw,62px);font-weight:700;letter-spacing:.08em;line-height:1}
.rc-crew .role-name{color:var(--jade2)}
.rc-imp  .role-name{color:var(--rose2)}
.role-sep{width:48px;height:1px;background:var(--line2)}
.role-wlabel{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--fog)}
.role-word{font-family:var(--serif);font-size:clamp(26px,7vw,46px);font-weight:700;line-height:1.15;color:var(--snow);word-break:break-word;hyphens:auto;text-align:center;max-width:100%;padding:0 4px}
.role-hint{font-size:13px;color:var(--fog);line-height:1.6;max-width:280px}

/* ── PHASE ROW / PIPS ───────────────────────── */
.phase-row{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px}
.phase-pill{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;background:var(--ink3);border:1px solid var(--line2);padding:6px 14px;border-radius:20px;color:var(--fog);white-space:nowrap}
.pips{display:flex;gap:6px;align-items:center}
.pip{width:8px;height:8px;border-radius:50%;background:var(--line2);transition:all .3s}
.pip.active{background:var(--gold);box-shadow:0 0 7px rgba(201,168,76,.65)}
.pip.fail{background:var(--rose);box-shadow:0 0 7px rgba(232,69,90,.5)}
.pip.win{background:var(--jade);box-shadow:0 0 7px rgba(46,207,138,.5)}

/* ── WORD BAR ───────────────────────────────── */
.word-bar{width:100%;background:var(--ink2);border:1px solid var(--line);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.word-bar-lbl{font-size:11px;color:var(--fog);font-family:var(--mono);letter-spacing:.1em;flex-shrink:0;text-transform:uppercase}
.word-bar-val{font-family:var(--serif);font-size:clamp(18px,5vw,26px);font-weight:700;color:var(--snow);word-break:break-word;flex:1;min-width:0}
.rtag{font-size:11px;padding:4px 10px;border-radius:16px;font-family:var(--mono);letter-spacing:.06em;flex-shrink:0}
.rtag-crew{background:rgba(46,207,138,.12);color:var(--jade2)}
.rtag-imp {background:rgba(232,69,90,.12);color:var(--rose2)}

/* ── DISCUSS PLAYER LIST ────────────────────── */
.sec-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--fog);margin-bottom:8px}
.av-sm{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--iris),var(--rose));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.prow-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── VOTE ───────────────────────────────────── */
.vote-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.vc{background:var(--ink2);border:1.5px solid var(--line);border-radius:16px;padding:18px 10px 14px;cursor:pointer;transition:all .18s;position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center}
.vc:not(.vc-self):hover{border-color:var(--rose);transform:translateY(-2px);background:rgba(232,69,90,.05)}
.vc.vc-voted{border-color:var(--rose);background:rgba(232,69,90,.08)}
.vc.vc-self{opacity:.38;cursor:default}
.vc-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--iris),var(--rose));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.vc-name{font-size:13px;font-weight:600;word-break:break-word;max-width:100%;line-height:1.2}
.vc-cnt{font-size:11px;color:var(--rose2);font-family:var(--mono);min-height:14px}
.vc-check{position:absolute;top:7px;right:9px;color:var(--rose2);font-size:15px;font-weight:700}
.vote-msg{font-size:13px;color:var(--jade);text-align:center;font-family:var(--mono);letter-spacing:.05em}

/* ── ROUND FAILED ───────────────────────────── */
.rf-card{width:100%;border-radius:20px;background:linear-gradient(160deg,#1c1008,#2a1a0a);border:1px solid rgba(201,168,76,.22);padding:36px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;animation:cardPop .4s ease}
.rf-icon{font-size:48px;animation:breathe 2s ease-in-out infinite}
.rf-title{font-family:var(--serif);font-size:30px;font-weight:700;color:var(--gold2)}
.rf-sub{font-size:14px;color:var(--fog);line-height:1.6;max-width:300px}
.rf-badge{font-family:var(--mono);font-size:11px;letter-spacing:.15em;color:var(--gold);background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);padding:6px 16px;border-radius:20px}

/* ── RESULT ─────────────────────────────────── */
.result-screen{justify-content:center}
.result-card{width:100%;border-radius:24px;padding:36px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px;animation:cardPop .5s ease}
.rc-win{background:linear-gradient(160deg,#071a10,#0d2a18);border:1px solid rgba(46,207,138,.25)}
.rc-lose{background:linear-gradient(160deg,#1a0710,#2a0d18);border:1px solid rgba(232,69,90,.25)}
.result-icon{font-size:56px;animation:breathe 2s ease-in-out infinite}
.result-headline{font-family:var(--serif);font-size:clamp(28px,8vw,40px);font-weight:700;letter-spacing:.06em}
.rc-win  .result-headline{color:var(--jade2)}
.rc-lose .result-headline{color:var(--rose2)}
.result-copy{font-size:14px;color:var(--fog);line-height:1.65;max-width:320px}
.reveal-box{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px}
.rev-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;gap:12px}
.rev-lbl{font-size:12px;color:var(--fog);font-family:var(--mono);white-space:nowrap}
.rev-val{font-weight:700;text-align:right;word-break:break-word;max-width:60%}
.tally-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--fog);margin-bottom:10px}
.t-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:13px}
.t-name{width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--dust)}
.t-track{flex:1;background:var(--ink3);border-radius:4px;overflow:hidden;height:22px}
.t-fill{height:100%;min-width:22px;background:linear-gradient(90deg,var(--rose),var(--iris));border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:700;font-family:var(--mono);transition:width .7s ease}

/* ── TOAST ──────────────────────────────────── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink3);border:1px solid var(--line2);padding:11px 22px;border-radius:12px;font-size:13px;font-family:var(--mono);color:var(--rose2);letter-spacing:.05em;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:toastIn .25s ease;z-index:2000;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis}
@keyframes toastIn{from{transform:translateX(-50%) translateY(14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.shake{animation:shake .35s ease;border-color:var(--rose)!important}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
</style>
</head>

function genCode(){return Math.random().toString(36).substring(2,7).toUpperCase()}
function genId(){return Math.random().toString(36).substring(2,13)}
function rnd(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}

function toast(msg){
  var o=document.querySelector('.toast');if(o)o.remove();
  var el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.remove();},3200);
}
function shake(id){
  var el=document.getElementById(id);if(!el)return;
  el.classList.remove('shake');void el.offsetWidth;
  el.classList.add('shake');setTimeout(function(){el.classList.remove('shake');},400);
}
var root=document.getElementById('app');
function R(html){root.innerHTML=html}

function stopScanner(){
  if(G.qrScanner){

}

/* Pips renderer */
function pips(round,failed){
  var h='<div class="pips">';
  for(var i=1;i<=3;i++){
    var cls='pip';
    if(i<round){ cls+=failed&&failed.indexOf(i)>=0?' fail':' win'; }
    else if(i===round) cls+=' active';
    h+='<div class="'+cls+'"></div>';
  }
  return h+'</div>';
}

function startQrScanner(){
  if(typeof Html5Qrcode==='undefined') return;
  // Small delay so DOM is fully painted
  setTimeout(function(){
    var readerEl=document.getElementById('qr-reader');
    if(!readerEl) return;
    try{
      var scanner=new Html5Qrcode('qr-reader',{verbose:false});
      G.qrScanner=scanner;
      var config={fps:12,qrbox:function(w,h){var s=Math.min(w,h)*0.7;return{width:s,height:s}},aspectRatio:1.0};
      scanner.start(
        {facingMode:'environment'},
        config,
        function(decoded){
          // Success
          var code=null;
          try{var u=new URL(decoded);code=u.searchParams.get('join');}
          catch(e){if(decoded&&decoded.length>=4&&decoded.length<=7)code=decoded.replace(/\s/g,'').toUpperCase();}
          if(code){
            var s=document.getElementById('scanStatus');
            if(s){s.textContent='✓ Code found: '+code;s.className='scan-note scan-ok';}
            stopScanner();
            setTimeout(function(){joinByCode(code.toUpperCase());},500);
          }
        },
        function(){/* scan miss - ignore */}
      ).catch(function(err){
        var s=document.getElementById('scanStatus');
        if(s) s.textContent='Camera unavailable — type the code below';
      });
    }catch(e){
      var s=document.getElementById('scanStatus');
      if(s) s.textContent='Camera unavailable — type the code below';
    }
  },350);
}

function submitHostName(){
  var name=document.getElementById('nameInput').value.trim();
  if(!name){shake('nameInput');return;}
  G.playerName=name;
  var obj={host:G.playerId,status:'lobby',createdAt:Date.now(),round:1,failedRounds:[],players:{}};
  obj.players[G.playerId]={name:name,isHost:true,joinedAt:Date.now()};
  db.ref('games/'+G.gameCode).set(obj)
    .then(function(){listenGame(G.gameCode);showLobby();})
    .catch(function(e){toast('Firebase: '+e.message);});
}

function joinByCode(over){
  stopScanner();
  var code=over||(document.getElementById('codeInput')&&document.getElementById('codeInput').value.trim().toUpperCase());
  if(!code||code.length<4){shake('codeInput');return;}
  db.ref('games/'+code).once('value').then(function(snap){
    if(!snap.exists()){toast('Game not found.');return;}
    var gd=snap.val();
    if(gd.status!=='lobby'){toast('Game already in progress.');return;}
    G.gameCode=code;G.playerId=genId();G.isHost=false;
    showNameEntry(false,code);
  }).catch(function(e){toast('Error: '+e.message);});
}

function submitJoinName(code){
  var name=document.getElementById('nameInput').value.trim();
  if(!name){shake('nameInput');return;}
  G.playerName=name;
  db.ref('games/'+code+'/players/'+G.playerId).set({name:name,isHost:false,joinedAt:Date.now()})
    .then(function(){listenGame(code);showLobby();})
    .catch(function(e){toast('Error: '+e.message);});
}

/* ═══════════════ START GAME ═════════════════ */
function startGame(){
  if(!G.isHost) return;
  var ids=Object.keys(G.players);
  if(ids.length<2) return;
  var pair=rnd(WORDS);
  var imp=shuffle(ids)[0];
  var roles={};
  ids.forEach(function(id){roles[id]={role:id===imp?'impostor':'real',word:id===imp?pair.imp:pair.real};});
  db.ref('games/'+G.gameCode).update({
    status:'role',roles:roles,
    realWord:pair.real,impostorWord:pair.imp,
    votes:null,round:1,failedRounds:[]
  });
}

/* ═══════════════ VOTE RESULT CHECK ══════════ */
function checkVoteResult(){
  if(!G.isHost) return;
  var players=G.players,votes=(G.gameData&&G.gameData.votes)||{};
  if(Object.keys(votes).length<Object.keys(players).length) return;
  var tally={};
  Object.values(votes).forEach(function(v){tally[v]=(tally[v]||0)+1;});
  var max=Math.max.apply(null,Object.values(tally));
  var top=Object.keys(tally).filter(function(id){return tally[id]===max;});
  var elim=top[0];
  var roles=G.gameData.roles||{};
  var impId=Object.keys(roles).find(function(id){return roles[id].role==='impostor';});
  var crewWon=elim===impId;
  var round=G.gameData.round||1;
  var failedRounds=G.gameData.failedRounds?G.gameData.failedRounds.slice():[];

  if(crewWon){
    db.ref('games/'+G.gameCode).update({status:'result',eliminatedId:elim,crewWon:true,tally:tally,failedRounds:failedRounds});
  } else if(round>=3){
    db.ref('games/'+G.gameCode).update({status:'result',eliminatedId:elim,crewWon:false,tally:tally,failedRounds:failedRounds});
  } else {
    failedRounds.push(round);
    db.ref('games/'+G.gameCode).update({status:'round_failed',failedElim:elim,round:round+1,failedRounds:failedRounds,tally:tally,votes:null});
  }
}

/* ═══════════════ ROUND FAILED ═══════════════ */
function showRoundFailed(){
  G.view='round_failed';
  var gd=G.gameData;
  var failedName=(G.players[gd.failedElim]||{}).name||'Someone';
  var nextRound=gd.round||2;
  var triesLeft=3-(nextRound-1);
  var failed=gd.failedRounds||[];
  R(
    '<div class="screen" style="justify-content:center">'+
    '<div class="rf-card">'+
      '<div class="rf-icon">🚫</div>'+
      pips(nextRound-1,failed)+
      '<p class="rf-title">Wrong Suspect!</p>'+
      '<p class="rf-sub"><strong style="color:var(--snow)">'+failedName+'</strong> was not the Impostor.<br>The game continues — give new clues!</p>'+
      '<div class="rf-badge">'+triesLeft+' round'+(triesLeft!==1?'s':'')+' remaining</div>'+
      (G.isHost?'<button class="btn btn-gold" style="margin-top:8px;max-width:220px" onclick="nextRound()">Continue →</button>':'<p class="lobby-hint" style="margin-top:8px">Waiting for host to continue…</p>')+
    '</div>'+
    '</div>'
  );
}

function nextRound(){
  if(!G.isHost) return;
  G.votedAlready=false;
  db.ref('games/'+G.gameCode+'/votedAlready').remove();
  db.ref('games/'+G.gameCode).update({status:'discuss'});
}

/* ═══════════════ RESULT ═════════════════════ */
function showResult(){
  G.view='result';
  var gd=G.gameData;
  var crewWon=gd.crewWon;
  var elimName=(G.players[gd.eliminatedId]||{}).name||'Unknown';
  var roles=gd.roles||{};
  var impId=Object.keys(roles).find(function(id){return roles[id].role==='impostor';});
  var impName=(G.players[impId]||{}).name||'Unknown';
  var rounds=gd.round||1;
  var failed=gd.failedRounds||[];
  var tallyRows=Object.keys(gd.tally||{}).sort(function(a,b){return gd.tally[b]-gd.tally[a];}).map(function(id){
    var cnt=gd.tally[id],w=Math.min(cnt*52,200);
    return '<div class="t-row"><span class="t-name">'+((G.players[id]||{}).name||id)+'</span>'+
      '<div class="t-track"><div class="t-fill" style="width:'+w+'px">'+cnt+'</div></div></div>';
  }).join('');
  R(
    '<div class="screen result-screen">'+
    '<div class="result-card '+(crewWon?'rc-win':'rc-lose')+'">'+
      '<div class="result-icon">'+(crewWon?'🎉':'😈')+'</div>'+
      pips(rounds,failed)+
      '<p class="result-headline">'+(crewWon?'CREW WINS':'IMPOSTOR WINS')+'</p>'+
      '<p class="result-copy">'+
        (crewWon?'<strong style="color:var(--snow)">'+elimName+'</strong> was correctly identified — they were the Impostor!':
          (rounds>=3?'All 3 rounds exhausted. <strong style="color:var(--snow)">'+impName+'</strong> escaped undetected!':'<strong style="color:var(--snow)">'+impName+'</strong> slipped away undetected.'))+
      '</p>'+
      '<div class="reveal-box">'+
        '<div class="rev-row"><span class="rev-lbl">🟢 Crew Word</span><span class="rev-val">'+gd.realWord+'</span></div>'+
        '<div class="rev-row"><span class="rev-lbl">🔴 Impostor Word</span><span class="rev-val">'+gd.impostorWord+'</span></div>'+
        '<div class="rev-row"><span class="rev-lbl">🕵️ Impostor Was</span><span class="rev-val">'+impName+'</span></div>'+
        '<div class="rev-row"><span class="rev-lbl">⚔️ Rounds Played</span><span class="rev-val">'+rounds+'</span></div>'+
      '</div>'+
      '<div style="width:100%"><p class="tally-title">Final Vote Tally</p>'+tallyRows+'</div>'+
      (G.isHost?'<button class="btn btn-gold" onclick="playAgain()" style="margin-top:4px">🔁&nbsp; Play Again</button>':'<p class="lobby-hint">Waiting for host to restart…</p>')+
    '</div>'+
    '</div>'
  );
}

function playAgain(){
  if(!G.isHost) return;
  G.votedAlready=false;
  var rp={};
  Object.keys(G.players).forEach(function(id){
    var p=G.players[id];rp[id]={name:p.name,isHost:!!p.isHost,joinedAt:p.joinedAt||0};
  });
  db.ref('games/'+G.gameCode).set({
    host:G.playerId,status:'lobby',createdAt:Date.now(),
    round:1,failedRounds:[],players:rp
  });
}

/* ═══════════════ REALTIME LISTENER ══════════ */
function listenGame(code){
  if(G.dbOff){G.dbOff();G.dbOff=null;}
  var ref=db.ref('games/'+code);
  var h=ref.on('value',function(snap){
    if(!snap.exists()) return;
    var gd=snap.val();
    G.gameData=gd;G.players=gd.players||{};
    switch(gd.status){
      case 'lobby':          G.votedAlready=false; showLobby();        break;
      case 'role':           if(G.view!=='role')         showRole();         break;
      case 'discuss':        if(G.view!=='discuss')      showDiscuss();      break;
      case 'vote':           showVote(); checkVoteResult();              break;
      case 'round_failed':   if(G.view!=='round_failed') showRoundFailed();  break;
      case 'result':         if(G.view!=='result')       showResult();       break;
    }
  });
  G.dbOff=function(){ref.off('value',h);};
}

/* ═══════════════ URL PARAM JOIN ════════════ */
function checkUrlParams(){
  var p=new URLSearchParams(location.search),c=p.get('join');
  if(c){
    history.replaceState({},'',location.pathname);
    G.playerId=genId();G.isHost=false;
    joinByCode(c.toUpperCase());
  }
}

checkUrlParams();
showHome();
</script>
