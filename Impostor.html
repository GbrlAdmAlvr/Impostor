<html lang="en">
<head>

<title>IMPOSTOR — Social Deduction Game</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--surface:#111120;--surface2:#1a1a30;
  --border:#2a2a45;--text:#e8e8f0;--muted:#7070a0;
  --accent:#ff4d6d;--accent2:#7b61ff;--green:#22d68a;--yellow:#f5c542;
  --r:16px;--fh:'Syne',sans-serif;--fm:'Space Mono',monospace;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fh);-webkit-font-smoothing:antialiased}
#app{min-height:100vh;display:flex;align-items:flex-start;justify-content:center}
.screen{width:100%;max-width:520px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px 60px;gap:20px}

/* HOME */
.home-screen{justify-content:center;position:relative;overflow:hidden}
.home-bg{position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(123,97,255,.18) 0%,transparent 70%),
             radial-gradient(ellipse 60% 40% at 80% 80%,rgba(255,77,109,.12) 0%,transparent 60%)}
.home-content{position:relative;text-align:center;display:flex;flex-direction:column;align-items:center;gap:40px;max-width:400px;width:100%}
.logo-block{display:flex;flex-direction:column;align-items:center;gap:10px}
.eye-icon{font-size:64px;animation:pulse-eye 2s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(255,77,109,.6))}
@keyframes pulse-eye{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.logo-text{font-size:clamp(52px,14vw,80px);font-weight:800;letter-spacing:.12em;line-height:1;
  background:linear-gradient(135deg,#ff4d6d,#7b61ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-family:var(--fm);font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.home-actions{display:flex;flex-direction:column;gap:12px;width:100%}
.home-footer{color:var(--muted);font-size:13px;font-family:var(--fm)}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px 24px;border:none;
  border-radius:var(--r);font-family:var(--fh);font-size:16px;font-weight:700;letter-spacing:.05em;
  cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn:hover:not(:disabled){transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#ff4d6d,#c0392b);color:#fff;box-shadow:0 8px 30px rgba(255,77,109,.35)}
.btn-primary:hover:not(:disabled){box-shadow:0 12px 40px rgba(255,77,109,.55)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){border-color:var(--accent2)}
.btn-ghost{background:transparent;color:var(--accent2);border:2px solid var(--accent2);max-width:220px}
.btn-outline-red{background:transparent;color:var(--accent);border:2px solid var(--accent)}

/* PANEL */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px 28px;
  width:100%;display:flex;flex-direction:column;gap:18px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.panel-title{font-size:28px;font-weight:800}
.panel-sub{font-size:14px;color:var(--muted)}
.code-badge{font-family:var(--fm);letter-spacing:.2em;background:var(--surface2);border:1px solid var(--border);
  padding:2px 10px;border-radius:8px;font-size:16px;color:var(--accent)}
.input-field{width:100%;padding:14px 18px;background:var(--surface2);border:2px solid var(--border);
  border-radius:var(--r);color:var(--text);font-family:var(--fh);font-size:16px;outline:none;transition:border-color .2s}
.input-field:focus{border-color:var(--accent2)}
.input-field::placeholder{color:var(--muted)}
.back-btn{background:none;border:none;color:var(--muted);font-family:var(--fh);font-size:14px;
  cursor:pointer;align-self:flex-start;transition:color .15s}
.back-btn:hover{color:var(--text)}

/* DIVIDER */
.or-divider{display:flex;align-items:center;gap:12px;width:100%;color:var(--muted);font-size:12px;font-family:var(--fm)}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* QR SCANNER */
.scanner-wrap{width:100%;border-radius:16px;overflow:hidden;border:2px solid var(--border);background:#000;position:relative}
.scanner-wrap video{width:100%!important;height:auto!important}
#qr-reader{width:100%!important}
#qr-reader video{border-radius:14px}
#qr-reader img{display:none!important}
#qr-reader__dashboard_section_csr button{
  background:var(--accent2)!important;color:#fff!important;border:none!important;
  padding:10px 20px!important;border-radius:8px!important;font-family:var(--fh)!important;
  font-size:14px!important;cursor:pointer!important;margin-top:8px!important}
#qr-reader__status_span{color:var(--muted)!important;font-size:12px!important;font-family:var(--fm)!important}
#qr-reader__dashboard_section_swaplink{color:var(--accent2)!important;font-size:13px!important}
.scan-status{font-size:13px;color:var(--muted);font-family:var(--fm);text-align:center}
.scan-success{color:var(--green)!important}

/* LOBBY */
.lobby-header{width:100%;display:flex;justify-content:space-between;align-items:center;
  background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px 24px;gap:16px}
.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:6px}
.big-code{font-family:var(--fm);font-size:clamp(28px,8vw,44px);font-weight:700;letter-spacing:.25em;color:var(--accent)}
.qr-box{background:#fff;border-radius:12px;padding:8px;flex-shrink:0}
.player-count-badge{font-family:var(--fm);font-size:12px;color:var(--muted);
  background:var(--surface2);border:1px solid var(--border);padding:4px 12px;border-radius:20px}
.player-grid{width:100%;display:flex;flex-wrap:wrap;gap:10px}
.player-chip{display:flex;align-items:center;gap:10px;background:var(--surface);
  border:1px solid var(--border);border-radius:50px;padding:10px 16px;animation:pop-in .3s ease}
@keyframes pop-in{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.host-chip{border-color:var(--yellow)}
.player-avatar{width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.lobby-footer{width:100%;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.waiting-text{font-size:15px;color:var(--muted)}
.hint{font-size:13px;color:var(--muted);font-family:var(--fm);line-height:1.7}

/* ROLE */
.role-screen{justify-content:center}
.role-card{width:100%;border-radius:28px;padding:44px 28px;display:flex;flex-direction:column;
  align-items:center;text-align:center;gap:16px;border:1px solid var(--border);
  animation:card-reveal .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes card-reveal{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.card-impostor{background:linear-gradient(160deg,#1a0810,#2d0818);border-color:rgba(255,77,109,.3)}
.card-crew{background:linear-gradient(160deg,#081a12,#0d2d1a);border-color:rgba(34,214,138,.3)}
.role-eyeball{font-size:56px;animation:pulse-eye 1.5s ease-in-out infinite}
.role-label{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}
.role-title{font-size:52px;font-weight:800;letter-spacing:.1em;line-height:1}
.card-impostor .role-title{color:var(--accent)}
.card-crew .role-title{color:var(--green)}
.role-divider{width:60px;height:2px;background:var(--border)}
.role-word-label{font-size:12px;text-transform:uppercase;letter-spacing:.2em;color:var(--muted)}
.role-word{font-size:36px;font-weight:800;
  background:linear-gradient(135deg,var(--text),var(--muted));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.role-hint{font-size:14px;color:var(--muted);font-family:var(--fm)}

/* PHASE BADGE */
.phase-badge{font-family:var(--fm);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  background:var(--surface2);border:1px solid var(--border);padding:6px 16px;border-radius:20px;color:var(--muted)}

/* DISCUSS */
.your-word-bar{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;font-size:15px;gap:12px;flex-wrap:wrap}
.role-tag{font-size:12px;padding:4px 12px;border-radius:20px;font-family:var(--fm);flex-shrink:0}
.role-tag.real{background:rgba(34,214,138,.15);color:var(--green)}
.role-tag.impostor{background:rgba(255,77,109,.15);color:var(--accent)}
.player-list-vert{display:flex;flex-direction:column;gap:8px;width:100%}
.player-row{display:flex;align-items:center;gap:12px;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;padding:12px 16px}
.my-row{border-color:var(--accent2);background:rgba(123,97,255,.08)}
.avatar-sm{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
.order-label{font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:10px}

/* VOTE */
.vote-title{font-size:32px;font-weight:800}
.vote-sub{font-size:14px;color:var(--muted);font-family:var(--fm)}
.vote-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.vote-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:20px 12px;
  cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column;
  align-items:center;gap:8px;text-align:center}
.vote-card:not(.vote-self):hover{border-color:var(--accent);transform:translateY(-2px)}
.vote-card.voted{border-color:var(--accent);background:rgba(255,77,109,.1)}
.vote-card.vote-self{opacity:.4;cursor:default}
.vote-avatar{width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800}
.vote-name{font-size:14px;font-weight:700}
.vote-count{font-size:12px;color:var(--accent);font-family:var(--fm);min-height:16px}
.vote-check{position:absolute;top:8px;right:10px;color:var(--accent);font-size:18px;font-weight:800}
.voted-msg{color:var(--green);font-size:15px;text-align:center}

/* RESULT */
.result-screen{justify-content:center}
.result-card{width:100%;border-radius:28px;padding:36px 24px;display:flex;flex-direction:column;
  align-items:center;text-align:center;gap:18px;border:1px solid var(--border);animation:card-reveal .5s ease}
.crew-win{background:linear-gradient(160deg,#081a12,#0d2a18);border-color:rgba(34,214,138,.3)}
.imp-win{background:linear-gradient(160deg,#1a0810,#280d18);border-color:rgba(255,77,109,.3)}
.result-icon{font-size:60px;animation:pulse-eye 1.5s ease-in-out infinite}
.result-winner{font-size:36px;font-weight:800;letter-spacing:.08em}
.crew-win .result-winner{color:var(--green)}
.imp-win .result-winner{color:var(--accent)}
.result-detail{font-size:15px;color:var(--muted);line-height:1.6}
.reveal-block{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px}
.reveal-row{display:flex;justify-content:space-between;align-items:center;font-size:14px}
.reveal-label{color:var(--muted);font-size:13px}
.reveal-val{font-weight:700}
.tally-label{font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:10px;text-align:left}
.tally-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:14px}
.tally-name{min-width:80px;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.tally-bar{flex:1;background:var(--surface2);border-radius:6px;overflow:hidden;height:24px}
.tally-fill{height:100%;min-width:28px;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:12px;font-weight:700;transition:width .8s ease}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--border);padding:12px 24px;border-radius:12px;
  font-size:14px;color:var(--accent);font-family:var(--fm);box-shadow:0 8px 30px rgba(0,0,0,.5);
  animation:toast-in .3s ease;z-index:999;white-space:nowrap;max-width:90vw;text-align:center}
@keyframes toast-in{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.shake{animation:shake .4s ease;border-color:var(--accent)!important}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

<script>
// ── FIREBASE ───────────────────────────────────────────────────────────────

// ── WORD BANK ──────────────────────────────────────────────────────────────
var WORDS = [
  {real:"Piano",imp:"Keyboard"},{real:"Shark",imp:"Dolphin"},
  {real:"Pizza",imp:"Flatbread"},{real:"Astronaut",imp:"Cosmonaut"},
  {real:"Castle",imp:"Fortress"},{real:"Volcano",imp:"Mountain"},
  {real:"Submarine",imp:"Boat"},{real:"Diamond",imp:"Crystal"},
  {real:"Tiger",imp:"Leopard"},{real:"Helicopter",imp:"Drone"},
  {real:"Chocolate",imp:"Caramel"},{real:"Library",imp:"Bookstore"},
  {real:"Sword",imp:"Dagger"},{real:"Thunderstorm",imp:"Rain"},
  {real:"Motorcycle",imp:"Bicycle"},{real:"Vampire",imp:"Zombie"},
  {real:"Campfire",imp:"Bonfire"},{real:"Prison",imp:"Jail"},
  {real:"Telescope",imp:"Binoculars"},{real:"Tornado",imp:"Hurricane"},
  {real:"Guitar",imp:"Ukulele"},{real:"Crown",imp:"Tiara"},
  {real:"Cannon",imp:"Catapult"},{real:"Igloo",imp:"Tent"},
  {real:"Compass",imp:"Map"},{real:"Lantern",imp:"Flashlight"},
  {real:"Jungle",imp:"Forest"},{real:"Pirate",imp:"Viking"},
  {real:"Rocket",imp:"Missile"},{real:"Mirror",imp:"Window"},
  {real:"Cactus",imp:"Palm Tree"},{real:"Snowflake",imp:"Raindrop"},
  {real:"Lighthouse",imp:"Watchtower"},{real:"Wizard",imp:"Witch"},
  {real:"Trampoline",imp:"Mattress"},{real:"Walrus",imp:"Seal"}
];

// ── STATE ──────────────────────────────────────────────────────────────────
var G = {
  view:'home', gameCode:null, playerId:null, playerName:null,
  isHost:false, role:null, myWord:null, players:{},
  gameData:null, votedAlready:false, dbOff:null, qrScanner:null
};

// ── UTILS ──────────────────────────────────────────────────────────────────
function genCode(){ return Math.random().toString(36).substring(2,7).toUpperCase(); }
function genId(){ return Math.random().toString(36).substring(2,13); }
function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function toast(msg){
  var o=document.querySelector('.toast'); if(o)o.remove();
  var el=document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.body.appendChild(el); setTimeout(function(){if(el.parentNode)el.remove();},3000);
}
function shake(id){
  var el=document.getElementById(id); if(!el)return;
  el.classList.remove('shake'); void el.offsetWidth;
  el.classList.add('shake'); setTimeout(function(){el.classList.remove('shake');},500);
}
var root=document.getElementById('app');
function R(html){ root.innerHTML=html; }

function stopScanner(){
  if(G.qrScanner){
    try{ G.qrScanner.stop().catch(function(){}); } catch(e){}
    G.qrScanner=null;
  }
}

// ── HOME ──────────────────────────────────────────────────────────────────
function showHome(){
  stopScanner();
  G.view='home';
  if(G.dbOff){ G.dbOff(); G.dbOff=null; }
  R(
    '<div class="screen home-screen">'+
    '<div class="home-bg"></div>'+
    '<div class="home-content">'+
      '<div class="logo-block">'+
        '<div class="eye-icon">👁</div>'+
        '<h1 class="logo-text">IMPOSTOR</h1>'+
        '<p class="tagline">Social Deduction · Real Time · No Mercy</p>'+
      '</div>'+
      '<div class="home-actions">'+
        '<button class="btn btn-primary" onclick="hostGame()">⚡ Host a Game</button>'+
        '<button class="btn btn-secondary" onclick="showJoin()">🔍 Join a Game</button>'+
      '</div>'+
      '<div class="home-footer"><p>Scan a QR code or enter a game code to join</p></div>'+
    '</div>'+
    '</div>'
  );
}

// ── JOIN SCREEN (QR scanner + manual code) ────────────────────────────────
function showJoin(){
  stopScanner();
  R(
    '<div class="screen" style="justify-content:flex-start;padding-top:40px">'+
    '<div class="panel" style="gap:20px">'+
      '<button class="back-btn" onclick="showHome()">← Back</button>'+
      '<h2 class="panel-title">Join a Game</h2>'+

      '<div style="width:100%">'+
        '<p style="font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:10px;font-family:var(--fm)">📷 Scan QR Code</p>'+
        '<div class="scanner-wrap"><div id="qr-reader"></div></div>'+
        '<p class="scan-status" id="scanStatus">Point your camera at the host\'s QR code</p>'+
      '</div>'+

      '<div class="or-divider">or enter code manually</div>'+

      '<input id="codeInput" class="input-field" type="text" placeholder="e.g. ABC12" maxlength="5" autocomplete="off"'+
        ' style="text-transform:uppercase;letter-spacing:.2em;font-size:22px;text-align:center"/>'+
      '<button class="btn btn-primary" onclick="joinByCode()">Join →</button>'+
    '</div>'+
    '</div>'
  );
  document.getElementById('codeInput').addEventListener('keydown',function(e){if(e.key==='Enter')joinByCode();});

  // Start QR scanner
  setTimeout(function(){
    if(typeof Html5Qrcode === 'undefined'){ return; }
    try{
      var scanner = new Html5Qrcode('qr-reader');
      G.qrScanner = scanner;
      scanner.start(
        { facingMode:'environment' },
        { fps:10, qrbox:{ width:200, height:200 } },
        function(decodedText){
          // Parse the join URL
          var code = null;
          try{
            var url = new URL(decodedText);
            code = url.searchParams.get('join');
          } catch(e){
            // Maybe it's just the code itself
            if(decodedText && decodedText.length >= 4 && decodedText.length <= 6){
              code = decodedText.toUpperCase();
            }
          }
          if(code){
            var statusEl = document.getElementById('scanStatus');
            if(statusEl){ statusEl.textContent='✅ Code found: '+code; statusEl.className='scan-status scan-success'; }
            stopScanner();
            setTimeout(function(){ joinByCode(code.toUpperCase()); }, 400);
          }
        },
        function(){ /* scan miss, ignore */ }
      ).catch(function(err){ 
        var statusEl=document.getElementById('scanStatus');
        if(statusEl){ statusEl.textContent='Camera unavailable — enter code manually'; }
      });
    } catch(e){
      var statusEl=document.getElementById('scanStatus');
      if(statusEl){ statusEl.textContent='Camera unavailable — enter code manually'; }
    }
  }, 300);
}

// ── HOST GAME ─────────────────────────────────────────────────────────────
function hostGame(){
  G.gameCode = genCode();
  G.playerId = genId();
  G.isHost   = true;
  showNameEntry(true, G.gameCode);
}

function showNameEntry(isHost, code){
  stopScanner();
  var action = isHost ? 'submitHostName()' : "submitJoinName('"+code+"')";
  var btnLabel = isHost ? '🚀 Create Lobby' : '✅ Join Game';
  R(
    '<div class="screen" style="justify-content:center">'+
    '<div class="panel">'+
      '<button class="back-btn" onclick="showHome()">← Back</button>'+
      '<h2 class="panel-title">'+(isHost?'Name Yourself':'Your Name')+'</h2>'+
      '<p class="panel-sub">Game Code: <span class="code-badge">'+code+'</span></p>'+
      '<input id="nameInput" class="input-field" type="text" placeholder="Enter your name…" maxlength="16" autocomplete="off"/>'+
      '<button class="btn btn-primary" onclick="'+action+'">'+btnLabel+'</button>'+
    '</div>'+
    '</div>'
  );
  var ni = document.getElementById('nameInput');
  ni.focus();
  ni.addEventListener('keydown', function(e){
    if(e.key==='Enter'){ isHost ? submitHostName() : submitJoinName(code); }
  });
}

function submitHostName(){
  var name = document.getElementById('nameInput').value.trim();
  if(!name){ shake('nameInput'); return; }
  G.playerName = name;
  var code = G.gameCode, pid = G.playerId;
  var gameObj = { host:pid, status:'lobby', createdAt:Date.now(), players:{} };
  gameObj.players[pid] = { name:name, isHost:true };
  db.ref('games/'+code).set(gameObj)
    .then(function(){ listenGame(code); showLobby(); })
    .catch(function(e){ toast('Firebase error: '+e.message); });
}

function joinByCode(codeOverride){
  stopScanner();
  var code = codeOverride || (document.getElementById('codeInput') && document.getElementById('codeInput').value.trim().toUpperCase());
  if(!code || code.length < 4){ shake('codeInput'); return; }
  db.ref('games/'+code).once('value').then(function(snap){
    if(!snap.exists()){ toast('Game not found. Check the code.'); return; }
    var gd = snap.val();
    if(gd.status !== 'lobby'){ toast('This game has already started.'); return; }
    G.gameCode  = code;
    G.playerId  = genId();
    G.isHost    = false;
    showNameEntry(false, code);
  }).catch(function(e){ toast('Error: '+e.message); });
}

function submitJoinName(code){
  var name = document.getElementById('nameInput').value.trim();
  if(!name){ shake('nameInput'); return; }
  G.playerName = name;
  db.ref('games/'+code+'/players/'+G.playerId).set({ name:name, isHost:false })
    .then(function(){ listenGame(code); showLobby(); })
    .catch(function(e){ toast('Error: '+e.message); });
}

// ── LOBBY ─────────────────────────────────────────────────────────────────
function showLobby(){
  G.view = 'lobby';
  var players  = G.players || {};
  var pIds     = Object.keys(players);
  var count    = pIds.length;
  // No player limit — min 2 to start
  var canStart = G.isHost && count >= 2;
  var joinUrl  = location.origin + location.pathname + '?join=' + G.gameCode;

  var chips = pIds.map(function(id){
    var p = players[id];
    return '<div class="player-chip'+(p.isHost?' host-chip':'')+'">'+
      '<div class="player-avatar">'+p.name[0].toUpperCase()+'</div>'+
      '<span>'+p.name+'</span>'+
      (p.isHost ? '<span style="font-size:14px">👑</span>' : '')+
    '</div>';
  }).join('');

  var footer = G.isHost
    ? '<button class="btn btn-primary"'+(canStart?'':' disabled')+' onclick="startGame()">⚡ Start Game</button>'+
      '<p class="hint">Share code <strong style="color:var(--accent)">'+G.gameCode+'</strong> or scan the QR to invite friends<br>'+
      '<span style="color:var(--accent2)">No player limit</span> · Minimum 2 to start</p>'
    : '<p class="hint">Waiting for the host to start…</p>';

  R(
    '<div class="screen">'+
    '<div class="lobby-header">'+
      '<div>'+
        '<div class="lbl">Game Code</div>'+
        '<div class="big-code">'+G.gameCode+'</div>'+
        '<div class="player-count-badge" style="margin-top:6px">'+count+' player'+(count!==1?'s':'')+' joined</div>'+
      '</div>'+
      '<div id="qrbox" class="qr-box"></div>'+
    '</div>'+
    '<div class="player-grid" id="playerList">'+chips+'</div>'+
    '<div class="lobby-footer">'+
      '<p class="waiting-text">'+(count<2?'Need at least 2 players ('+count+'/2)':count+' players in lobby')+'</p>'+
      footer+
    '</div>'+
    '</div>'
  );

  setTimeout(function(){
    var qrEl = document.getElementById('qrbox');
    if(qrEl && typeof QRCode !== 'undefined'){
      qrEl.innerHTML = '';
      new QRCode(qrEl,{ text:joinUrl, width:96, height:96, colorDark:'#080810', colorLight:'#ffffff' });
    }
  }, 100);
}

// ── START GAME ────────────────────────────────────────────────────────────
function startGame(){
  if(!G.isHost) return;
  var players = G.players;
  var ids = Object.keys(players);
  if(ids.length < 2) return;

  var pair = rnd(WORDS);
  var shuffled = shuffle(ids);
  var impostorId = shuffled[0]; // always 1 impostor regardless of player count

  var roles = {};
  ids.forEach(function(id){
    roles[id] = {
      role: id===impostorId ? 'impostor' : 'real',
      word: id===impostorId ? pair.imp : pair.real
    };
  });

  db.ref('games/'+G.gameCode).update({
    status:'role', roles:roles,
    realWord:pair.real, impostorWord:pair.imp, votes:null, round:1
  });
}

// ── ROLE REVEAL ───────────────────────────────────────────────────────────
function showRole(){
  G.view = 'role';
  var myRole = G.gameData && G.gameData.roles && G.gameData.roles[G.playerId];
  if(!myRole){ toast('Waiting for role assignment…'); return; }
  G.role   = myRole.role;
  G.myWord = myRole.word;
  var isImp = G.role === 'impostor';

  R(
    '<div class="screen role-screen">'+
    '<div class="role-card '+(isImp?'card-impostor':'card-crew')+'">'+
      '<div class="role-eyeball">'+(isImp?'🔴':'🟢')+'</div>'+
      '<div class="role-label">'+(isImp?'YOU ARE THE':'YOU ARE')+'</div>'+
      '<div class="role-title">'+(isImp?'IMPOSTOR':'CREW')+'</div>'+
      '<div class="role-divider"></div>'+
      '<div class="role-word-label">Your Secret Word</div>'+
      '<div class="role-word">'+myRole.word+'</div>'+
      '<div class="role-hint">'+(isImp?'🕵️ Blend in. Don\'t get caught.':'🗣️ Give a clue. Find the impostor.')+'</div>'+
      '<button class="btn btn-ghost" style="margin-top:8px" onclick="goToDiscuss()">I\'m Ready →</button>'+
    '</div>'+
    '</div>'
  );
}

function goToDiscuss(){
  if(G.isHost){
    db.ref('games/'+G.gameCode).update({ status:'discuss' });
  } else {
    showDiscuss();
  }
}

// ── DISCUSS ───────────────────────────────────────────────────────────────
function showDiscuss(){
  G.view = 'discuss';
  var players = G.players;
  var rows = Object.keys(players).map(function(id){
    var p = players[id], isMe = id===G.playerId;
    return '<div class="player-row'+(isMe?' my-row':'')+'">'+
      '<div class="avatar-sm">'+p.name[0].toUpperCase()+'</div>'+
      '<span>'+p.name+(isMe?' <span style="color:var(--accent2);font-size:12px">(You)</span>':'')+'</span>'+
    '</div>';
  }).join('');

  R(
    '<div class="screen">'+
    '<div class="phase-badge">💬 DISCUSSION PHASE</div>'+
    '<div style="text-align:center">'+
      '<h2 style="font-size:28px;font-weight:800">Talk it out</h2>'+
      '<p style="font-size:14px;color:var(--muted);margin-top:6px">Give ONE clue about your word. Don\'t say it directly!</p>'+
    '</div>'+
    '<div class="your-word-bar">'+
      'Your word: <strong>'+G.myWord+'</strong>'+
      '<span class="role-tag '+G.role+'">'+(G.role==='impostor'?'🔴 Impostor':'🟢 Crew')+'</span>'+
    '</div>'+
    '<div style="width:100%">'+
      '<p class="order-label">Players ('+Object.keys(players).length+')</p>'+
      '<div class="player-list-vert">'+rows+'</div>'+
    '</div>'+
    '<div style="width:100%;text-align:center">'+
      (G.isHost
        ? '<button class="btn btn-primary" onclick="startVote()">🗳 Start Voting</button>'
        : '<p class="hint">Waiting for host to open voting…</p>')+
    '</div>'+
    '</div>'
  );
}

// ── VOTE ──────────────────────────────────────────────────────────────────
function startVote(){
  if(!G.isHost) return;
  db.ref('games/'+G.gameCode).update({ status:'vote', votes:null });
}

function showVote(){
  G.view = 'vote';
  var players = G.players;
  var votes   = (G.gameData && G.gameData.votes) || {};
  var myVote  = votes[G.playerId];
  var voteCount    = Object.keys(votes).length;
  var totalPlayers = Object.keys(players).length;

  var cards = Object.keys(players).map(function(id){
    var p = players[id], isMe = id===G.playerId, votedFor = myVote===id;
    var cnt = Object.values(votes).filter(function(v){ return v===id; }).length;
    return '<div class="vote-card'+(votedFor?' voted':'')+(isMe?' vote-self':'')+'"'+
      (!myVote&&!isMe?' onclick="castVote(\''+id+'\')"':'')+'>'+
      '<div class="vote-avatar">'+p.name[0].toUpperCase()+'</div>'+
      '<div class="vote-name">'+p.name+(isMe?'<br><span style="font-size:11px;color:var(--muted)">(You)</span>':'')+'</div>'+
      '<div class="vote-count">'+(cnt>0?cnt+' vote'+(cnt>1?'s':''):'')+'</div>'+
      (votedFor?'<div class="vote-check">✓</div>':'')+
    '</div>';
  }).join('');

  R(
    '<div class="screen">'+
    '<div class="phase-badge">🗳 VOTING PHASE</div>'+
    '<h2 class="vote-title">Who\'s the Impostor?</h2>'+
    '<p class="vote-sub">'+voteCount+' / '+totalPlayers+' voted</p>'+
    '<div class="vote-grid">'+cards+'</div>'+
    (myVote
      ? '<p class="voted-msg">✅ Vote cast! Waiting for others…</p>'
      : '<p class="hint" style="text-align:center">Tap a player to vote them out</p>')+
    '</div>'
  );
}

function castVote(targetId){
  if(G.votedAlready) return;
  G.votedAlready = true;
  db.ref('games/'+G.gameCode+'/votes/'+G.playerId).set(targetId);
}

function checkVoteResult(){
  if(!G.isHost) return;
  var players = G.players;
  var votes   = (G.gameData && G.gameData.votes) || {};
  if(Object.keys(votes).length < Object.keys(players).length) return;

  var tally = {};
  Object.values(votes).forEach(function(v){ tally[v]=(tally[v]||0)+1; });
  var maxVotes = Math.max.apply(null, Object.values(tally));
  var topIds   = Object.keys(tally).filter(function(id){ return tally[id]===maxVotes; });
  var eliminatedId = topIds[0];
  var roles = (G.gameData && G.gameData.roles) || {};
  var impostorId = Object.keys(roles).find(function(id){ return roles[id].role==='impostor'; });
  var crewWon = eliminatedId === impostorId;

  db.ref('games/'+G.gameCode).update({
    status:'result', eliminatedId:eliminatedId, crewWon:crewWon, tally:tally
  });
}

// ── RESULT ────────────────────────────────────────────────────────────────
function showResult(){
  G.view = 'result';
  var gd = G.gameData;
  var crewWon      = gd.crewWon;
  var eliminatedId = gd.eliminatedId;
  var elimName     = (G.players[eliminatedId]||{}).name||'Unknown';
  var roles        = gd.roles||{};
  var impostorId   = Object.keys(roles).find(function(id){ return roles[id].role==='impostor'; });
  var impostorName = (G.players[impostorId]||{}).name||'Unknown';

  var tallyRows = Object.keys(gd.tally||{})
    .sort(function(a,b){ return gd.tally[b]-gd.tally[a]; })
    .map(function(id){
      var cnt = gd.tally[id];
      var w = Math.min(cnt*44, 180);
      return '<div class="tally-row">'+
        '<span class="tally-name">'+((G.players[id]||{}).name||id)+'</span>'+
        '<div class="tally-bar"><div class="tally-fill" style="width:'+w+'px">'+cnt+'</div></div>'+
      '</div>';
    }).join('');

  R(
    '<div class="screen result-screen">'+
    '<div class="result-card '+(crewWon?'crew-win':'imp-win')+'">'+
      '<div class="result-icon">'+(crewWon?'🎉':'😈')+'</div>'+
      '<div class="result-winner">'+(crewWon?'CREW WINS!':'IMPOSTOR WINS!')+'</div>'+
      '<p class="result-detail">'+
        (crewWon
          ? '<strong>'+elimName+'</strong> was voted out — they were the Impostor!'
          : '<strong>'+elimName+'</strong> was eliminated — the Impostor escaped!')+
      '</p>'+
      '<div class="reveal-block">'+
        '<div class="reveal-row"><span class="reveal-label">🟢 Crew\'s Word</span><span class="reveal-val">'+gd.realWord+'</span></div>'+
        '<div class="reveal-row"><span class="reveal-label">🔴 Impostor\'s Word</span><span class="reveal-val">'+gd.impostorWord+'</span></div>'+
        '<div class="reveal-row"><span class="reveal-label">🕵️ Impostor Was</span><span class="reveal-val">'+impostorName+'</span></div>'+
      '</div>'+
      '<div style="width:100%"><p class="tally-label">Final Votes</p>'+tallyRows+'</div>'+
      (G.isHost
        ? '<button class="btn btn-primary" onclick="playAgain()">🔁 Play Again</button>'
        : '<p class="hint">Waiting for host to restart…</p>')+
    '</div>'+
    '</div>'
  );
}

function playAgain(){
  if(!G.isHost) return;
  G.votedAlready = false;
  var resetPlayers = {};
  Object.keys(G.players).forEach(function(id){
    var p = G.players[id];
    resetPlayers[id] = { name:p.name, isHost:!!p.isHost };
  });
  db.ref('games/'+G.gameCode).set({
    host:G.playerId, status:'lobby', createdAt:Date.now(), players:resetPlayers
  });
}

// ── REALTIME LISTENER ─────────────────────────────────────────────────────
function listenGame(code){
  if(G.dbOff){ G.dbOff(); G.dbOff=null; }
  var gameRef = db.ref('games/'+code);
  var handler = gameRef.on('value', function(snap){
    if(!snap.exists()) return;
    var gd = snap.val();
    G.gameData = gd;
    G.players  = gd.players || {};

    switch(gd.status){
      case 'lobby':
        G.votedAlready = false;
        showLobby();
        break;
      case 'role':
        if(G.view!=='role') showRole();
        break;
      case 'discuss':
        if(G.view!=='discuss') showDiscuss();
        break;
      case 'vote':
        showVote();
        checkVoteResult();
        break;
      case 'result':
        if(G.view!=='result') showResult();
        break;
    }
  });
  G.dbOff = function(){ gameRef.off('value', handler); };
}

// ── URL PARAM AUTO-JOIN ───────────────────────────────────────────────────
function checkUrlParams(){
  var params = new URLSearchParams(location.search);
  var joinCode = params.get('join');
  if(joinCode){
    history.replaceState({}, '', location.pathname);
    G.playerId = genId();
    G.isHost   = false;
    joinByCode(joinCode.toUpperCase());
  }
}

// ── BOOT ─────────────────────────────────────────────────────────────────
checkUrlParams();
showHome();
</script>
</body>
</html>
